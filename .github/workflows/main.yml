name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configuración de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalación de dependencias (npm install)
        run: npm install

      - name: Build de la aplicación (npm run build)
        run: npm run build

      - name: Configuración de credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy automático al bucket S3
        run: aws s3 sync build/ s3://laboratorio-react-cicd-jose --delete